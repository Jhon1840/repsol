<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a1a2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Consulta Puntos">
    <meta name="application-name" content="Consulta Puntos">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Consulta de Puntos</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
    <link rel="stylesheet" href="./styles.css?v=20260425-2">
</head>
<body data-api-base="">
    <main class="portal-main">
        <section class="rider-entry">
            <article class="rider-entry-card">
                <header class="rider-entry-header">
                    <div
                        class="rider-brand-row"
                        style="display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: nowrap; width: 100%; margin: 0 auto 1rem;"
                    >
                        <div
                            class="rider-top-logo"
                            style="display: flex; align-items: center; justify-content: center; width: 9rem; min-height: 5.25rem; overflow: hidden; flex: 0 0 auto;"
                        >
                            <img
                                src="./PedidosYa.png"
                                alt="PedidosYa"
                                width="168"
                                height="96"
                                style="width: 9rem; max-width: 9rem; height: auto; max-height: 5.25rem; display: block; object-fit: contain;"
                            >
                        </div>

                        <div
                            class="rider-entry-logo"
                            style="display: inline-flex; width: 7rem; height: 7rem; align-items: center; justify-content: center; border-radius: 999px; background: rgba(255, 255, 255, 0.08); flex: 0 0 auto;"
                        >
                            <img src="../assets/REPSOL LUBRICANTS VERTICAL BLANCO.png" alt="Repsol Lubricants">
                        </div>
                    </div>
                    <span class="rider-entry-eyebrow">Consulta oficial</span>
                    <h1>Consulta de Puntos</h1>
                    <p>Ingresa tu ID para consultar tus puntos acumulados dentro del programa Riders.</p>
                </header>

                <form class="rider-entry-form" id="rider-points-form">
                    <div class="rider-form-group">
                        <label for="rider_id">ID de Rider</label>
                        <input
                            id="rider_id"
                            name="rider_id"
                            type="text"
                            placeholder="Ej: PYA00065"
                            autocomplete="off"
                            required
                        >
                    </div>

                    <div class="rider-message" id="rider-message" role="status" hidden></div>

                    <button type="submit" class="rider-submit-button" id="rider-submit-button">
                        Consultar Puntos
                    </button>

                    <div class="rider-install-card" id="portal-install-card" hidden>
                        <p class="rider-install-copy" id="portal-install-copy">
                            Instala esta app para consultar puntos más rápido desde tu dispositivo.
                        </p>

                        <button type="button" class="rider-install-button" id="portal-install-button" hidden>
                            Instalar app
                        </button>

                        <p class="rider-install-hint" id="portal-install-hint" hidden></p>
                    </div>

                </form>

                <section class="rider-result-card" id="rider-result" hidden>
                    <span class="rider-result-label">Puntos acumulados</span>
                    <strong id="rider-points">0</strong>
                    <div class="rider-result-detail">
                        <span id="rider-name"></span>
                        <span id="rider-code"></span>
                        <span id="rider-rango"></span>
                    </div>

                    <a href="#" class="rider-rewards-button" id="rider-rewards-link" hidden>
                        Ver premios disponibles
                    </a>

                    <div class="rider-movements" id="rider-movements" hidden>
                        <h2>Últimos movimientos</h2>
                        <div class="rider-movement-list" id="rider-movement-list"></div>
                    </div>
                </section>
            </article>
        </section>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', {
                    scope: '/consulta-puntos/',
                }).then((registration) => {
                    window.__PWA_SW_STATUS__ = {
                        ok: true,
                        scope: registration.scope,
                    };
                    console.info('[PWA DEBUG] Service worker registrado.', registration.scope);
                }).catch((error) => {
                    window.__PWA_SW_STATUS__ = {
                        ok: false,
                        error: error?.message ?? 'Error desconocido',
                    };
                    console.warn('[PWA DEBUG] No se pudo registrar el service worker.', error);
                });
            });
        }
    </script>
    <script src="./app.js?v=20260425-2"></script>
</body>
</html>
